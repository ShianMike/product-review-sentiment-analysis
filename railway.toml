[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'gunicorn --chdir backend _11_app:app --bind 0.0.0.0:${PORT:-8080} --workers 1 --threads 4 --timeout 120'"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
